{% extends "base.html" %}
{% block title %}Edit Video{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Video</h2>
    <form method="POST">
        <div class="mb-3">
            <label for="title" class="form-label">Title</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ video.title }}" required>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ video.description }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('tutorial') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
